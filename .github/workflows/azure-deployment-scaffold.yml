name: azure-deployment-scaffold

on:
  workflow_dispatch:
    inputs:
      environmentName:
        description: 'Environment name'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      resourceGroupName:
        description: 'Azure resource group name'
        required: true
        type: string
      location:
        description: 'Azure region'
        required: true
        default: 'eastus'
        type: string
      namePrefix:
        description: 'Resource name prefix'
        required: true
        default: 'migration'
        type: string
      queueExecutorImage:
        description: 'Queue executor image'
        required: false
        default: 'migration-queue-executor:local'
        type: string
      whatIfOnly:
        description: 'Run what-if only'
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  azure-what-if:
    name: Azure scaffold what-if
    runs-on: windows-latest
    environment: ${{ inputs.environmentName }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run deployment scaffold what-if
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\deploy\azure\deploy-cloud-scaffold.ps1 `
            -ResourceGroupName "${{ inputs.resourceGroupName }}" `
            -Location "${{ inputs.location }}" `
            -EnvironmentName "${{ inputs.environmentName }}" `
            -NamePrefix "${{ inputs.namePrefix }}" `
            -QueueExecutorImage "${{ inputs.queueExecutorImage }}" `
            -WhatIf

  azure-deploy:
    name: Azure scaffold deploy
    runs-on: windows-latest
    environment: ${{ inputs.environmentName }}
    needs: azure-what-if
    if: ${{ inputs.whatIfOnly == false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run deployment scaffold
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\deploy\azure\deploy-cloud-scaffold.ps1 `
            -ResourceGroupName "${{ inputs.resourceGroupName }}" `
            -Location "${{ inputs.location }}" `
            -EnvironmentName "${{ inputs.environmentName }}" `
            -NamePrefix "${{ inputs.namePrefix }}" `
            -QueueExecutorImage "${{ inputs.queueExecutorImage }}"
