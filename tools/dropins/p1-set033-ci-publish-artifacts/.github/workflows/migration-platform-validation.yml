name: migration-platform-validation

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  backend:
    name: Backend build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Admin API
        run: dotnet restore .\src\Migration.Admin.Api\Migration.Admin.Api.csproj

      - name: Build Admin API
        run: dotnet build .\src\Migration.Admin.Api\Migration.Admin.Api.csproj --no-restore

      - name: Restore Queue Executor
        run: dotnet restore .\src\Workers\Migration.Workers.QueueExecutor\Migration.Workers.QueueExecutor.csproj

      - name: Build Queue Executor
        run: dotnet build .\src\Workers\Migration.Workers.QueueExecutor\Migration.Workers.QueueExecutor.csproj --no-restore

  publish:
    name: Publish backend artifacts
    runs-on: windows-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish cloud artifacts
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\tools\build\publish-cloud-artifacts.ps1 -Clean

      - name: Upload Admin API artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-api-publish
          path: artifacts/publish/admin-api

      - name: Upload Queue Executor artifact
        uses: actions/upload-artifact@v4
        with:
          name: queue-executor-publish
          path: artifacts/publish/queue-executor

      - name: Upload publish manifest
        uses: actions/upload-artifact@v4
        with:
          name: publish-manifest
          path: artifacts/publish/publish-manifest.json

  frontend:
    name: Frontend build
    runs-on: windows-latest

    defaults:
      run:
        working-directory: src/Admin/Migration.Admin.Web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: src/Admin/Migration.Admin.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: admin-web-dist
          path: src/Admin/Migration.Admin.Web/dist

  cloud-diagnostics:
    name: Cloud diagnostics template validation
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate cloud diagnostic templates
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\tools\cloud\validate-cloud-diagnostics.ps1 -SkipHttp -Strict
